<svg xmlns="http://www.w3.org/2000/svg" width="802" height="2468"><style>.fg{fill:#aaa}.bg{fill:#000}.fg-bright-cyan{fill:#5ff}.fg-bright-green{fill:#5f5}.fg-cyan{fill:#0aa}.container{padding:0 10px;line-height:18px}.bold{font-weight:700}tspan{font:14px SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace;white-space:pre;line-height:18px}</style><rect width="100%" height="100%" y="0" class="bg" rx="4.5"/><text class="container fg" xml:space="preserve"><tspan x="10" y="28"><tspan>Generate tab-completion scripts for your shell</tspan> </tspan> <tspan x="10" y="46"> </tspan> <tspan x="10" y="64"><tspan class="fg-bright-green bold">Usage:</tspan><tspan> </tspan><tspan class="fg-bright-cyan bold">rustup[EXE] completions</tspan><tspan> </tspan><tspan class="fg-cyan">&lt;SHELL&gt;</tspan><tspan> </tspan><tspan class="fg-cyan">[COMMAND]</tspan> </tspan> <tspan x="10" y="82"> </tspan> <tspan x="10" y="100"><tspan class="fg-bright-green bold">Arguments:</tspan> </tspan> <tspan x="10" y="118"><tspan> </tspan><tspan class="fg-cyan">&lt;SHELL&gt;</tspan><tspan> [possible values: bash, elvish, fish, powershell, zsh]</tspan> </tspan> <tspan x="10" y="136"><tspan> </tspan><tspan class="fg-cyan">[COMMAND]</tspan><tspan> [default: rustup] [possible values: rustup, cargo]</tspan> </tspan> <tspan x="10" y="154"> </tspan> <tspan x="10" y="172"><tspan class="fg-bright-green bold">Options:</tspan> </tspan> <tspan x="10" y="190"><tspan> </tspan><tspan class="fg-bright-cyan bold">-h</tspan><tspan>, </tspan><tspan class="fg-bright-cyan bold">--help</tspan><tspan> Print help</tspan> </tspan> <tspan x="10" y="208"> </tspan> <tspan x="10" y="226"><tspan class="fg-bright-green bold">Discussion:</tspan> </tspan> <tspan x="10" y="244"><tspan> Enable tab completion for Bash, Fish, Zsh, or PowerShell</tspan> </tspan> <tspan x="10" y="262"><tspan> The script is output on `stdout`, allowing one to re-direct the</tspan> </tspan> <tspan x="10" y="280"><tspan> output to the file of their choosing. Where you place the file</tspan> </tspan> <tspan x="10" y="298"><tspan> will depend on which shell, and which operating system you are</tspan> </tspan> <tspan x="10" y="316"><tspan> using. Your particular configuration may also determine where</tspan> </tspan> <tspan x="10" y="334"><tspan> these scripts need to be placed.</tspan> </tspan> <tspan x="10" y="352"> </tspan> <tspan x="10" y="370"><tspan> Here are some common set ups for the three supported shells under</tspan> </tspan> <tspan x="10" y="388"><tspan> Unix and similar operating systems (such as GNU/Linux).</tspan> </tspan> <tspan x="10" y="406"> </tspan> <tspan x="10" y="424"><tspan> </tspan><tspan class="bold">Bash:</tspan> </tspan> <tspan x="10" y="442"> </tspan> <tspan x="10" y="460"><tspan> Completion files are commonly stored in `/etc/bash_completion.d/` for</tspan> </tspan> <tspan x="10" y="478"><tspan> system-wide commands, but can be stored in</tspan> </tspan> <tspan x="10" y="496"><tspan> `~/.local/share/bash-completion/completions` for user-specific commands.</tspan> </tspan> <tspan x="10" y="514"><tspan> Run the command:</tspan> </tspan> <tspan x="10" y="532"> </tspan> <tspan x="10" y="550"><tspan> </tspan><tspan class="fg-bright-cyan bold">$ mkdir -p ~/.local/share/bash-completion/completions</tspan> </tspan> <tspan x="10" y="568"><tspan> </tspan><tspan class="fg-bright-cyan bold">$ rustup completions bash &gt; ~/.local/share/bash-completion/completions/rustup</tspan> </tspan> <tspan x="10" y="586"> </tspan> <tspan x="10" y="604"><tspan> This installs the completion script. You may have to log out and</tspan> </tspan> <tspan x="10" y="622"><tspan> log back in to your shell session for the changes to take effect.</tspan> </tspan> <tspan x="10" y="640"> </tspan> <tspan x="10" y="658"><tspan> </tspan><tspan class="bold">Bash (macOS/Homebrew):</tspan> </tspan> <tspan x="10" y="676"> </tspan> <tspan x="10" y="694"><tspan> Homebrew stores bash completion files within the Homebrew directory.</tspan> </tspan> <tspan x="10" y="712"><tspan> With the `bash-completion` brew formula installed, run the command:</tspan> </tspan> <tspan x="10" y="730"> </tspan> <tspan x="10" y="748"><tspan> </tspan><tspan class="fg-bright-cyan bold">$ mkdir -p $(brew --prefix)/etc/bash_completion.d</tspan> </tspan> <tspan x="10" y="766"><tspan> </tspan><tspan class="fg-bright-cyan bold">$ rustup completions bash &gt; $(brew --prefix)/etc/bash_completion.d/rustup.bash-completion</tspan> </tspan> <tspan x="10" y="784"> </tspan> <tspan x="10" y="802"><tspan> </tspan><tspan class="bold">Fish:</tspan> </tspan> <tspan x="10" y="820"> </tspan> <tspan x="10" y="838"><tspan> Fish completion files are commonly stored in</tspan> </tspan> <tspan x="10" y="856"><tspan> `$HOME/.config/fish/completions`. Run the command:</tspan> </tspan> <tspan x="10" y="874"> </tspan> <tspan x="10" y="892"><tspan> </tspan><tspan class="fg-bright-cyan bold">$ mkdir -p ~/.config/fish/completions</tspan> </tspan> <tspan x="10" y="910"><tspan> </tspan><tspan class="fg-bright-cyan bold">$ rustup completions fish &gt; ~/.config/fish/completions/rustup.fish</tspan> </tspan> <tspan x="10" y="928"> </tspan> <tspan x="10" y="946"><tspan> This installs the completion script. You may have to log out and</tspan> </tspan> <tspan x="10" y="964"><tspan> log back in to your shell session for the changes to take effect.</tspan> </tspan> <tspan x="10" y="982"> </tspan> <tspan x="10" y="1000"><tspan> </tspan><tspan class="bold">Xonsh:</tspan> </tspan> <tspan x="10" y="1018"> </tspan> <tspan x="10" y="1036"><tspan> In Xonsh you can reuse Fish completion by installing `xontrib-fish-completer`.</tspan> </tspan> <tspan x="10" y="1054"> </tspan> <tspan x="10" y="1072"><tspan> </tspan><tspan class="bold">Zsh:</tspan> </tspan> <tspan x="10" y="1090"> </tspan> <tspan x="10" y="1108"><tspan> ZSH completions are commonly stored in any directory listed in</tspan> </tspan> <tspan x="10" y="1126"><tspan> your `$fpath` variable. To use these completions, you must either</tspan> </tspan> <tspan x="10" y="1144"><tspan> add the generated script to one of those directories, or add your</tspan> </tspan> <tspan x="10" y="1162"><tspan> own to this list.</tspan> </tspan> <tspan x="10" y="1180"> </tspan> <tspan x="10" y="1198"><tspan> Adding a custom directory is often the safest bet if you are</tspan> </tspan> <tspan x="10" y="1216"><tspan> unsure of which directory to use. First create the directory; for</tspan> </tspan> <tspan x="10" y="1234"><tspan> this example we&apos;ll create a hidden directory inside our `$HOME`</tspan> </tspan> <tspan x="10" y="1252"><tspan> directory:</tspan> </tspan> <tspan x="10" y="1270"> </tspan> <tspan x="10" y="1288"><tspan> </tspan><tspan class="fg-bright-cyan bold">$ mkdir ~/.zfunc</tspan> </tspan> <tspan x="10" y="1306"> </tspan> <tspan x="10" y="1324"><tspan> Then add the following lines to your `.zshrc` just before</tspan> </tspan> <tspan x="10" y="1342"><tspan> `compinit`:</tspan> </tspan> <tspan x="10" y="1360"> </tspan> <tspan x="10" y="1378"><tspan> </tspan><tspan class="fg-bright-cyan bold">fpath+=~/.zfunc</tspan> </tspan> <tspan x="10" y="1396"> </tspan> <tspan x="10" y="1414"><tspan> Now you can install the completions script using the following</tspan> </tspan> <tspan x="10" y="1432"><tspan> command:</tspan> </tspan> <tspan x="10" y="1450"> </tspan> <tspan x="10" y="1468"><tspan> </tspan><tspan class="fg-bright-cyan bold">$ rustup completions zsh &gt; ~/.zfunc/_rustup</tspan> </tspan> <tspan x="10" y="1486"> </tspan> <tspan x="10" y="1504"><tspan> You must then either log out and log back in, or simply run</tspan> </tspan> <tspan x="10" y="1522"> </tspan> <tspan x="10" y="1540"><tspan> </tspan><tspan class="fg-bright-cyan bold">$ exec zsh</tspan> </tspan> <tspan x="10" y="1558"> </tspan> <tspan x="10" y="1576"><tspan> for the new completions to take effect.</tspan> </tspan> <tspan x="10" y="1594"> </tspan> <tspan x="10" y="1612"><tspan> </tspan><tspan class="bold">Custom locations:</tspan> </tspan> <tspan x="10" y="1630"> </tspan> <tspan x="10" y="1648"><tspan> Alternatively, you could save these files to the place of your</tspan> </tspan> <tspan x="10" y="1666"><tspan> choosing, such as a custom directory inside your $HOME. Doing so</tspan> </tspan> <tspan x="10" y="1684"><tspan> will require you to add the proper directives, such as `source`ing</tspan> </tspan> <tspan x="10" y="1702"><tspan> inside your login script. Consult your shells documentation for</tspan> </tspan> <tspan x="10" y="1720"><tspan> how to add such directives.</tspan> </tspan> <tspan x="10" y="1738"> </tspan> <tspan x="10" y="1756"><tspan> </tspan><tspan class="bold">PowerShell:</tspan> </tspan> <tspan x="10" y="1774"> </tspan> <tspan x="10" y="1792"><tspan> The powershell completion scripts require PowerShell v5.0+ (which</tspan> </tspan> <tspan x="10" y="1810"><tspan> comes with Windows 10, but can be downloaded separately for windows 7</tspan> </tspan> <tspan x="10" y="1828"><tspan> or 8.1).</tspan> </tspan> <tspan x="10" y="1846"> </tspan> <tspan x="10" y="1864"><tspan> First, check if a profile has already been set</tspan> </tspan> <tspan x="10" y="1882"> </tspan> <tspan x="10" y="1900"><tspan> </tspan><tspan class="fg-bright-cyan bold">PS C:/&gt; Test-Path $profile</tspan> </tspan> <tspan x="10" y="1918"> </tspan> <tspan x="10" y="1936"><tspan> If the above command returns `False` run the following</tspan> </tspan> <tspan x="10" y="1954"> </tspan> <tspan x="10" y="1972"><tspan> </tspan><tspan class="fg-bright-cyan bold">PS C:/&gt; New-Item -path $profile -type file -force</tspan> </tspan> <tspan x="10" y="1990"> </tspan> <tspan x="10" y="2008"><tspan> Now open the file provided by `$profile` (if you used the</tspan> </tspan> <tspan x="10" y="2026"><tspan> `New-Item` command it will be</tspan> </tspan> <tspan x="10" y="2044"><tspan> `${env:USERPROFILE}/Documents/WindowsPowerShell/Microsoft.PowerShell_profile.ps1`</tspan> </tspan> <tspan x="10" y="2062"> </tspan> <tspan x="10" y="2080"><tspan> Next, we either save the completions file into our profile, or</tspan> </tspan> <tspan x="10" y="2098"><tspan> into a separate file and source it inside our profile. To save the</tspan> </tspan> <tspan x="10" y="2116"><tspan> completions into our profile simply use</tspan> </tspan> <tspan x="10" y="2134"> </tspan> <tspan x="10" y="2152"><tspan> </tspan><tspan class="fg-bright-cyan bold">PS C:/&gt; rustup completions powershell &gt;&gt;</tspan> </tspan> <tspan x="10" y="2170"><tspan class="fg-bright-cyan bold"> ${env:USERPROFILE}/Documents/WindowsPowerShell/Microsoft.PowerShell_profile.ps1</tspan> </tspan> <tspan x="10" y="2188"> </tspan> <tspan x="10" y="2206"><tspan> </tspan><tspan class="bold">Cargo:</tspan> </tspan> <tspan x="10" y="2224"> </tspan> <tspan x="10" y="2242"><tspan> Rustup can also generate a completion script for `cargo`. The script output</tspan> </tspan> <tspan x="10" y="2260"><tspan> by `rustup` will source the completion script distributed with your default</tspan> </tspan> <tspan x="10" y="2278"><tspan> toolchain. Not all shells are currently supported. Here are examples for</tspan> </tspan> <tspan x="10" y="2296"><tspan> the currently supported shells.</tspan> </tspan> <tspan x="10" y="2314"> </tspan> <tspan x="10" y="2332"><tspan> </tspan><tspan class="bold">Bash:</tspan> </tspan> <tspan x="10" y="2350"> </tspan> <tspan x="10" y="2368"><tspan> </tspan><tspan class="fg-bright-cyan bold">$ rustup completions bash cargo &gt;&gt; ~/.local/share/bash-completion/completions/cargo</tspan> </tspan> <tspan x="10" y="2386"> </tspan> <tspan x="10" y="2404"><tspan> </tspan><tspan class="bold">Zsh:</tspan> </tspan> <tspan x="10" y="2422"> </tspan> <tspan x="10" y="2440"><tspan> </tspan><tspan class="fg-bright-cyan bold">$ rustup completions zsh cargo &gt; ~/.zfunc/_cargo</tspan></tspan></text></svg>