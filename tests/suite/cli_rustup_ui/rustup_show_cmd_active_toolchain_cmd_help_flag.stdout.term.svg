<svg xmlns="http://www.w3.org/2000/svg" width="740" height="326"><style>.fg{fill:#aaa}.bg{fill:#000}.fg-bright-cyan{fill:#5ff}.fg-bright-green{fill:#5f5}.fg-cyan{fill:#0aa}.container{padding:0 10px;line-height:18px}.bold{font-weight:700}tspan{font:14px SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace;white-space:pre;line-height:18px}</style><rect width="100%" height="100%" y="0" class="bg" rx="4.5"/><text class="container fg" xml:space="preserve"><tspan x="10" y="28"><tspan>Show the active toolchain</tspan> </tspan> <tspan x="10" y="46"> </tspan> <tspan x="10" y="64"><tspan class="fg-bright-green bold">Usage:</tspan><tspan> </tspan><tspan class="fg-bright-cyan bold">rustup[EXE] show active-toolchain</tspan><tspan> </tspan><tspan class="fg-cyan">[OPTIONS]</tspan> </tspan> <tspan x="10" y="82"> </tspan> <tspan x="10" y="100"><tspan class="fg-bright-green bold">Options:</tspan> </tspan> <tspan x="10" y="118"><tspan> </tspan><tspan class="fg-bright-cyan bold">-v</tspan><tspan>, </tspan><tspan class="fg-bright-cyan bold">--verbose</tspan><tspan> Enable verbose output with rustc information</tspan> </tspan> <tspan x="10" y="136"><tspan> </tspan><tspan class="fg-bright-cyan bold">-h</tspan><tspan>, </tspan><tspan class="fg-bright-cyan bold">--help</tspan><tspan> Print help</tspan> </tspan> <tspan x="10" y="154"> </tspan> <tspan x="10" y="172"><tspan class="fg-bright-green bold">Discussion:</tspan> </tspan> <tspan x="10" y="190"><tspan> Shows the name of the active toolchain.</tspan> </tspan> <tspan x="10" y="208"> </tspan> <tspan x="10" y="226"><tspan> This is useful for figuring out the active tool chain from</tspan> </tspan> <tspan x="10" y="244"><tspan> scripts.</tspan> </tspan> <tspan x="10" y="262"> </tspan> <tspan x="10" y="280"><tspan> You should use `rustc --print sysroot` to get the sysroot, or</tspan> </tspan> <tspan x="10" y="298"><tspan> `rustc --version` to get the toolchain version.</tspan></tspan></text></svg>