<svg xmlns="http://www.w3.org/2000/svg" width="852" height="596"><style>.fg{fill:#aaa}.bg{fill:#000}.fg-bright-cyan{fill:#5ff}.fg-bright-green{fill:#5f5}.fg-cyan{fill:#0aa}.container{padding:0 10px;line-height:18px}.bold{font-weight:700}tspan{font:14px SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace;white-space:pre;line-height:18px}</style><rect width="100%" height="100%" y="0" class="bg" rx="4.5"/><text class="container fg" xml:space="preserve"><tspan x="10" y="28"><tspan>Update Rust toolchains and rustup</tspan> </tspan> <tspan x="10" y="46"> </tspan> <tspan x="10" y="64"><tspan class="fg-bright-green bold">Usage:</tspan><tspan> </tspan><tspan class="fg-bright-cyan bold">rustup[EXE] update</tspan><tspan> </tspan><tspan class="fg-cyan">[OPTIONS]</tspan><tspan> </tspan><tspan class="fg-cyan">[TOOLCHAIN]...</tspan> </tspan> <tspan x="10" y="82"> </tspan> <tspan x="10" y="100"><tspan class="fg-bright-green bold">Arguments:</tspan> </tspan> <tspan x="10" y="118"><tspan> </tspan><tspan class="fg-cyan">[TOOLCHAIN]...</tspan><tspan> Toolchain name, such as &apos;stable&apos;, &apos;nightly&apos;, or &apos;1.8.0&apos;. For more information see</tspan> </tspan> <tspan x="10" y="136"><tspan> `rustup help toolchain`</tspan> </tspan> <tspan x="10" y="154"> </tspan> <tspan x="10" y="172"><tspan class="fg-bright-green bold">Options:</tspan> </tspan> <tspan x="10" y="190"><tspan> </tspan><tspan class="fg-bright-cyan bold">--no-self-update</tspan><tspan> Don&apos;t perform self update when running the `rustup update` command</tspan> </tspan> <tspan x="10" y="208"><tspan> </tspan><tspan class="fg-bright-cyan bold">--force</tspan><tspan> Force an update, even if some components are missing</tspan> </tspan> <tspan x="10" y="226"><tspan> </tspan><tspan class="fg-bright-cyan bold">--force-non-host</tspan><tspan> Install toolchains that require an emulator. See</tspan> </tspan> <tspan x="10" y="244"><tspan> https://github.com/rust-lang/rustup/wiki/Non-host-toolchains</tspan> </tspan> <tspan x="10" y="262"><tspan> </tspan><tspan class="fg-bright-cyan bold">-h</tspan><tspan>, </tspan><tspan class="fg-bright-cyan bold">--help</tspan><tspan> Print help</tspan> </tspan> <tspan x="10" y="280"> </tspan> <tspan x="10" y="298"><tspan class="fg-bright-green bold">Discussion:</tspan> </tspan> <tspan x="10" y="316"><tspan> With no toolchain specified, the `update` command updates each of</tspan> </tspan> <tspan x="10" y="334"><tspan> the installed toolchains from the official release channels, then</tspan> </tspan> <tspan x="10" y="352"><tspan> updates rustup itself.</tspan> </tspan> <tspan x="10" y="370"> </tspan> <tspan x="10" y="388"><tspan> If given a toolchain argument then `update` updates that</tspan> </tspan> <tspan x="10" y="406"><tspan> toolchain, the same as `rustup toolchain install`.</tspan> </tspan> <tspan x="10" y="424"> </tspan> <tspan x="10" y="442"><tspan> Some environment variables allow you to customize certain parameters</tspan> </tspan> <tspan x="10" y="460"><tspan> in toolchain installation, including:</tspan> </tspan> <tspan x="10" y="478"> </tspan> <tspan x="10" y="496"><tspan> - `RUSTUP_CONCURRENT_DOWNLOADS`: the number of concurrent downloads.</tspan> </tspan> <tspan x="10" y="514"><tspan> - `RUSTUP_DOWNLOAD_TIMEOUT`: the download timeout in seconds.</tspan> </tspan> <tspan x="10" y="532"> </tspan> <tspan x="10" y="550"><tspan> See &lt;https://rust-lang.github.io/rustup/devel/environment-variables.html&gt;</tspan> </tspan> <tspan x="10" y="568"><tspan> for more info.</tspan></tspan></text></svg>