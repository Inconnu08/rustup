<svg xmlns="http://www.w3.org/2000/svg" width="2347" height="92"><style>.fg{fill:#aaa}.bg{fill:#000}.fg-bright-cyan{fill:#5ff}.fg-bright-red{fill:#f55}.fg-yellow{fill:#a50}.container{padding:0 10px;line-height:18px}.bold{font-weight:700}tspan{font:14px SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace;white-space:pre;line-height:18px}</style><rect width="100%" height="100%" y="0" class="bg" rx="4.5"/><text class="container fg" xml:space="preserve"><tspan x="10" y="28"><tspan class="fg-bright-red bold">error:</tspan><tspan> invalid value &apos;</tspan><tspan class="fg-yellow bold">random</tspan><tspan>&apos; for &apos;</tspan><tspan class="fg-bright-cyan bold">[+toolchain]</tspan><tspan>&apos;: error: &quot;random&quot; is not a valid subcommand, so it was interpreted as a toolchain name, but it is also invalid. To override the toolchain using the &apos;rustup +toolchain&apos; syntax, make sure to prefix the toolchain override with a &apos;+&apos;</tspan> </tspan> <tspan x="10" y="46"> </tspan> <tspan x="10" y="64"><tspan>For more information, try &apos;</tspan><tspan class="fg-bright-cyan bold">--help</tspan><tspan>&apos;.</tspan></tspan></text></svg>