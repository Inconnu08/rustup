<svg xmlns="http://www.w3.org/2000/svg" width="776" height="434"><style>.fg{fill:#aaa}.bg{fill:#000}.fg-bright-cyan{fill:#5ff}.fg-bright-green{fill:#5f5}.fg-cyan{fill:#0aa}.container{padding:0 10px;line-height:18px}.bold{font-weight:700}tspan{font:14px SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace;white-space:pre;line-height:18px}</style><rect width="100%" height="100%" y="0" class="bg" rx="4.5"/><text class="container fg" xml:space="preserve"><tspan x="10" y="28"><tspan>Show the active and installed toolchains or profiles</tspan> </tspan> <tspan x="10" y="46"> </tspan> <tspan x="10" y="64"><tspan class="fg-bright-green bold">Usage:</tspan><tspan> </tspan><tspan class="fg-bright-cyan bold">rustup[EXE] show</tspan><tspan> </tspan><tspan class="fg-cyan">[OPTIONS]</tspan><tspan> </tspan><tspan class="fg-cyan">[COMMAND]</tspan> </tspan> <tspan x="10" y="82"> </tspan> <tspan x="10" y="100"><tspan class="fg-bright-green bold">Commands:</tspan> </tspan> <tspan x="10" y="118"><tspan> </tspan><tspan class="fg-bright-cyan bold">active-toolchain</tspan><tspan> Show the active toolchain</tspan> </tspan> <tspan x="10" y="136"><tspan> </tspan><tspan class="fg-bright-cyan bold">home</tspan><tspan> Display the computed value of RUSTUP_HOME</tspan> </tspan> <tspan x="10" y="154"><tspan> </tspan><tspan class="fg-bright-cyan bold">profile</tspan><tspan> Show the default profile used for the `rustup install` command</tspan> </tspan> <tspan x="10" y="172"><tspan> </tspan><tspan class="fg-bright-cyan bold">help</tspan><tspan> Print this message or the help of the given subcommand(s)</tspan> </tspan> <tspan x="10" y="190"> </tspan> <tspan x="10" y="208"><tspan class="fg-bright-green bold">Options:</tspan> </tspan> <tspan x="10" y="226"><tspan> </tspan><tspan class="fg-bright-cyan bold">-v</tspan><tspan>, </tspan><tspan class="fg-bright-cyan bold">--verbose</tspan><tspan> Enable verbose output with rustc information for all installed toolchains</tspan> </tspan> <tspan x="10" y="244"><tspan> </tspan><tspan class="fg-bright-cyan bold">-h</tspan><tspan>, </tspan><tspan class="fg-bright-cyan bold">--help</tspan><tspan> Print help</tspan> </tspan> <tspan x="10" y="262"> </tspan> <tspan x="10" y="280"><tspan class="fg-bright-green bold">Discussion:</tspan> </tspan> <tspan x="10" y="298"><tspan> Shows the name of the active toolchain and the version of `rustc`.</tspan> </tspan> <tspan x="10" y="316"> </tspan> <tspan x="10" y="334"><tspan> If the active toolchain has installed support for additional</tspan> </tspan> <tspan x="10" y="352"><tspan> compilation targets, then they are listed as well.</tspan> </tspan> <tspan x="10" y="370"> </tspan> <tspan x="10" y="388"><tspan> If there are multiple toolchains installed then all installed</tspan> </tspan> <tspan x="10" y="406"><tspan> toolchains are listed as well.</tspan></tspan></text></svg>