<svg xmlns="http://www.w3.org/2000/svg" width="860" height="524"><style>.fg{fill:#aaa}.bg{fill:#000}.fg-bright-cyan{fill:#5ff}.fg-bright-green{fill:#5f5}.fg-cyan{fill:#0aa}.container{padding:0 10px;line-height:18px}.bold{font-weight:700}tspan{font:14px SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace;white-space:pre;line-height:18px}</style><rect width="100%" height="100%" y="0" class="bg" rx="4.5"/><text class="container fg" xml:space="preserve"><tspan x="10" y="28"><tspan>Run a command with an environment configured for a given toolchain</tspan> </tspan> <tspan x="10" y="46"> </tspan> <tspan x="10" y="64"><tspan class="fg-bright-green bold">Usage:</tspan><tspan> </tspan><tspan class="fg-bright-cyan bold">rustup[EXE] run</tspan><tspan> </tspan><tspan class="fg-cyan">[OPTIONS]</tspan><tspan> </tspan><tspan class="fg-cyan">&lt;TOOLCHAIN&gt;</tspan><tspan> </tspan><tspan class="fg-cyan">&lt;COMMAND&gt;...</tspan> </tspan> <tspan x="10" y="82"> </tspan> <tspan x="10" y="100"><tspan class="fg-bright-green bold">Arguments:</tspan> </tspan> <tspan x="10" y="118"><tspan> </tspan><tspan class="fg-cyan">&lt;TOOLCHAIN&gt;</tspan><tspan> Toolchain name, such as &apos;stable&apos;, &apos;nightly&apos;, &apos;1.8.0&apos;, or a custom toolchain name, or</tspan> </tspan> <tspan x="10" y="136"><tspan> an absolute path. For more information see `rustup help toolchain`</tspan> </tspan> <tspan x="10" y="154"><tspan> </tspan><tspan class="fg-cyan">&lt;COMMAND&gt;...</tspan><tspan> </tspan> </tspan> <tspan x="10" y="172"> </tspan> <tspan x="10" y="190"><tspan class="fg-bright-green bold">Options:</tspan> </tspan> <tspan x="10" y="208"><tspan> </tspan><tspan class="fg-bright-cyan bold">--install</tspan><tspan> Install the requested toolchain if needed</tspan> </tspan> <tspan x="10" y="226"><tspan> </tspan><tspan class="fg-bright-cyan bold">-h</tspan><tspan>, </tspan><tspan class="fg-bright-cyan bold">--help</tspan><tspan> Print help</tspan> </tspan> <tspan x="10" y="244"> </tspan> <tspan x="10" y="262"><tspan class="fg-bright-green bold">Discussion:</tspan> </tspan> <tspan x="10" y="280"><tspan> Configures an environment to use the given toolchain and then runs</tspan> </tspan> <tspan x="10" y="298"><tspan> the specified program. The command may be any program, not just</tspan> </tspan> <tspan x="10" y="316"><tspan> rustc or cargo. This can be used for testing arbitrary toolchains</tspan> </tspan> <tspan x="10" y="334"><tspan> without setting an override.</tspan> </tspan> <tspan x="10" y="352"> </tspan> <tspan x="10" y="370"><tspan> Commands explicitly proxied by `rustup` (such as `rustc` and</tspan> </tspan> <tspan x="10" y="388"><tspan> `cargo`) also have a shorthand for this available. The toolchain</tspan> </tspan> <tspan x="10" y="406"><tspan> can be set by using `+toolchain` as the first argument. These are</tspan> </tspan> <tspan x="10" y="424"><tspan> equivalent:</tspan> </tspan> <tspan x="10" y="442"> </tspan> <tspan x="10" y="460"><tspan> </tspan><tspan class="fg-bright-cyan bold">$ cargo +nightly build</tspan> </tspan> <tspan x="10" y="478"> </tspan> <tspan x="10" y="496"><tspan> </tspan><tspan class="fg-bright-cyan bold">$ rustup run nightly cargo build</tspan></tspan></text></svg>