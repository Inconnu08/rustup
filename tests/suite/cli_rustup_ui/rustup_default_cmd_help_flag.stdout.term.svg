<svg xmlns="http://www.w3.org/2000/svg" width="860" height="326"><style>.fg{fill:#aaa}.bg{fill:#000}.fg-bright-cyan{fill:#5ff}.fg-bright-green{fill:#5f5}.fg-cyan{fill:#0aa}.container{padding:0 10px;line-height:18px}.bold{font-weight:700}tspan{font:14px SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace;white-space:pre;line-height:18px}</style><rect width="100%" height="100%" y="0" class="bg" rx="4.5"/><text class="container fg" xml:space="preserve"><tspan x="10" y="28"><tspan>Set the default toolchain</tspan> </tspan> <tspan x="10" y="46"> </tspan> <tspan x="10" y="64"><tspan class="fg-bright-green bold">Usage:</tspan><tspan> </tspan><tspan class="fg-bright-cyan bold">rustup[EXE] default</tspan><tspan> </tspan><tspan class="fg-cyan">[OPTIONS]</tspan><tspan> </tspan><tspan class="fg-cyan">[TOOLCHAIN]</tspan> </tspan> <tspan x="10" y="82"> </tspan> <tspan x="10" y="100"><tspan class="fg-bright-green bold">Arguments:</tspan> </tspan> <tspan x="10" y="118"><tspan> </tspan><tspan class="fg-cyan">[TOOLCHAIN]</tspan><tspan> &apos;none&apos;, a toolchain name, such as &apos;stable&apos;, &apos;nightly&apos;, &apos;1.8.0&apos;, or a custom toolchain</tspan> </tspan> <tspan x="10" y="136"><tspan> name. For more information see `rustup help toolchain`</tspan> </tspan> <tspan x="10" y="154"> </tspan> <tspan x="10" y="172"><tspan class="fg-bright-green bold">Options:</tspan> </tspan> <tspan x="10" y="190"><tspan> </tspan><tspan class="fg-bright-cyan bold">--force-non-host</tspan><tspan> Install toolchains that require an emulator. See</tspan> </tspan> <tspan x="10" y="208"><tspan> https://github.com/rust-lang/rustup/wiki/Non-host-toolchains</tspan> </tspan> <tspan x="10" y="226"><tspan> </tspan><tspan class="fg-bright-cyan bold">-h</tspan><tspan>, </tspan><tspan class="fg-bright-cyan bold">--help</tspan><tspan> Print help</tspan> </tspan> <tspan x="10" y="244"> </tspan> <tspan x="10" y="262"><tspan class="fg-bright-green bold">Discussion:</tspan> </tspan> <tspan x="10" y="280"><tspan> Sets the default toolchain to the one specified. If the toolchain</tspan> </tspan> <tspan x="10" y="298"><tspan> is not already installed then it is installed first.</tspan></tspan></text></svg>