<svg xmlns="http://www.w3.org/2000/svg" width="751" height="1064"><style>.fg{fill:#aaa}.bg{fill:#000}.fg-bright-cyan{fill:#5ff}.fg-bright-green{fill:#5f5}.fg-cyan{fill:#0aa}.container{padding:0 10px;line-height:18px}.bold{font-weight:700}tspan{font:14px SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace;white-space:pre;line-height:18px}</style><rect width="100%" height="100%" y="0" class="bg" rx="4.5"/><text class="container fg" xml:space="preserve"><tspan x="10" y="28"><tspan>Install, uninstall, or list toolchains</tspan> </tspan> <tspan x="10" y="46"> </tspan> <tspan x="10" y="64"><tspan class="fg-bright-green bold">Usage:</tspan><tspan> </tspan><tspan class="fg-bright-cyan bold">rustup[EXE] toolchain</tspan><tspan> </tspan><tspan class="fg-cyan">&lt;COMMAND&gt;</tspan> </tspan> <tspan x="10" y="82"> </tspan> <tspan x="10" y="100"><tspan class="fg-bright-green bold">Commands:</tspan> </tspan> <tspan x="10" y="118"><tspan> </tspan><tspan class="fg-bright-cyan bold">list</tspan><tspan> List installed toolchains</tspan> </tspan> <tspan x="10" y="136"><tspan> </tspan><tspan class="fg-bright-cyan bold">install</tspan><tspan> Install or update the given toolchains, or by default the active toolchain</tspan> </tspan> <tspan x="10" y="154"><tspan> </tspan><tspan class="fg-bright-cyan bold">uninstall</tspan><tspan> Uninstall the given toolchains</tspan> </tspan> <tspan x="10" y="172"><tspan> </tspan><tspan class="fg-bright-cyan bold">link</tspan><tspan> Create a custom toolchain by symlinking to a directory</tspan> </tspan> <tspan x="10" y="190"><tspan> </tspan><tspan class="fg-bright-cyan bold">help</tspan><tspan> Print this message or the help of the given subcommand(s)</tspan> </tspan> <tspan x="10" y="208"> </tspan> <tspan x="10" y="226"><tspan class="fg-bright-green bold">Options:</tspan> </tspan> <tspan x="10" y="244"><tspan> </tspan><tspan class="fg-bright-cyan bold">-h</tspan><tspan>, </tspan><tspan class="fg-bright-cyan bold">--help</tspan><tspan> Print help</tspan> </tspan> <tspan x="10" y="262"> </tspan> <tspan x="10" y="280"><tspan class="fg-bright-green bold">Discussion:</tspan> </tspan> <tspan x="10" y="298"><tspan> Many `rustup` commands deal with *toolchains*, a single</tspan> </tspan> <tspan x="10" y="316"><tspan> installation of the Rust compiler. `rustup` supports multiple</tspan> </tspan> <tspan x="10" y="334"><tspan> types of toolchains. The most basic track the official release</tspan> </tspan> <tspan x="10" y="352"><tspan> channels: &apos;stable&apos;, &apos;beta&apos; and &apos;nightly&apos;; but `rustup` can also</tspan> </tspan> <tspan x="10" y="370"><tspan> install specific toolchains from the official archives, toolchains for</tspan> </tspan> <tspan x="10" y="388"><tspan> alternate host platforms, and from local builds (&apos;custom toolchains&apos;).</tspan> </tspan> <tspan x="10" y="406"> </tspan> <tspan x="10" y="424"><tspan> Standard release channel toolchain names have the following form:</tspan> </tspan> <tspan x="10" y="442"> </tspan> <tspan x="10" y="460"><tspan> </tspan><tspan class="fg-cyan">&lt;channel&gt;[-&lt;date&gt;][-&lt;host&gt;]</tspan> </tspan> <tspan x="10" y="478"> </tspan> <tspan x="10" y="496"><tspan> </tspan><tspan class="fg-cyan">&lt;channel&gt; = stable|beta|nightly|&lt;versioned&gt;[-&lt;prerelease&gt;]</tspan> </tspan> <tspan x="10" y="514"><tspan> </tspan><tspan class="fg-cyan">&lt;versioned&gt; = &lt;major.minor&gt;|&lt;major.minor.patch&gt;</tspan> </tspan> <tspan x="10" y="532"><tspan> </tspan><tspan class="fg-cyan">&lt;prerelease&gt; = beta[.&lt;number&gt;]</tspan> </tspan> <tspan x="10" y="550"><tspan> </tspan><tspan class="fg-cyan">&lt;date&gt; = YYYY-MM-DD</tspan> </tspan> <tspan x="10" y="568"><tspan> </tspan><tspan class="fg-cyan">&lt;host&gt; = &lt;target-triple&gt;</tspan> </tspan> <tspan x="10" y="586"> </tspan> <tspan x="10" y="604"><tspan> &apos;channel&apos; is a named release channel, a major and minor version</tspan> </tspan> <tspan x="10" y="622"><tspan> number such as `1.42`, or a fully specified version number, such</tspan> </tspan> <tspan x="10" y="640"><tspan> as `1.42.0`. Channel names can be optionally appended with an</tspan> </tspan> <tspan x="10" y="658"><tspan> archive date, as in `nightly-2014-12-18`, in which case the</tspan> </tspan> <tspan x="10" y="676"><tspan> toolchain is downloaded from the archive for that date.</tspan> </tspan> <tspan x="10" y="694"> </tspan> <tspan x="10" y="712"><tspan> The host may be specified as a target tuple. This is most useful</tspan> </tspan> <tspan x="10" y="730"><tspan> for installing a 32-bit compiler on a 64-bit platform, or for</tspan> </tspan> <tspan x="10" y="748"><tspan> installing the [MSVC-based toolchain] on Windows. For example:</tspan> </tspan> <tspan x="10" y="766"> </tspan> <tspan x="10" y="784"><tspan> </tspan><tspan class="fg-bright-cyan bold">$ rustup toolchain install stable-x86_64-pc-windows-msvc</tspan> </tspan> <tspan x="10" y="802"> </tspan> <tspan x="10" y="820"><tspan> For convenience, omitted elements of the target tuple will be</tspan> </tspan> <tspan x="10" y="838"><tspan> inferred, so the above could be written:</tspan> </tspan> <tspan x="10" y="856"> </tspan> <tspan x="10" y="874"><tspan> </tspan><tspan class="fg-bright-cyan bold">$ rustup toolchain install stable-msvc</tspan> </tspan> <tspan x="10" y="892"> </tspan> <tspan x="10" y="910"><tspan> The `rustup default` command may be used to both install and set</tspan> </tspan> <tspan x="10" y="928"><tspan> the desired toolchain as default in a single command:</tspan> </tspan> <tspan x="10" y="946"> </tspan> <tspan x="10" y="964"><tspan> </tspan><tspan class="fg-bright-cyan bold">$ rustup default stable-msvc</tspan> </tspan> <tspan x="10" y="982"> </tspan> <tspan x="10" y="1000"><tspan> rustup can also manage symlinked local toolchain builds, which are</tspan> </tspan> <tspan x="10" y="1018"><tspan> often used for developing Rust itself. For more information see</tspan> </tspan> <tspan x="10" y="1036"><tspan> `rustup toolchain help link`.</tspan></tspan></text></svg>