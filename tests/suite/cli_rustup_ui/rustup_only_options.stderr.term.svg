<svg xmlns="http://www.w3.org/2000/svg" width="768" height="1172"><style>.fg{fill:#aaa}.bg{fill:#000}.fg-bright-cyan{fill:#5ff}.fg-bright-green{fill:#5f5}.fg-cyan{fill:#0aa}.container{padding:0 10px;line-height:18px}.bold{font-weight:700}tspan{font:14px SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace;white-space:pre;line-height:18px}</style><rect width="100%" height="100%" y="0" class="bg" rx="4.5"/><text class="container fg" xml:space="preserve"><tspan x="10" y="28"><tspan>rustup [..]</tspan> </tspan> <tspan x="10" y="46"> </tspan> <tspan x="10" y="64"><tspan>The Rust toolchain installer</tspan> </tspan> <tspan x="10" y="82"> </tspan> <tspan x="10" y="100"><tspan class="fg-bright-green bold">Usage:</tspan><tspan> </tspan><tspan class="fg-bright-cyan bold">rustup[EXE]</tspan><tspan> </tspan><tspan class="fg-cyan">[OPTIONS]</tspan><tspan> </tspan><tspan class="fg-cyan">[+toolchain]</tspan><tspan> </tspan><tspan class="fg-cyan">[COMMAND]</tspan> </tspan> <tspan x="10" y="118"> </tspan> <tspan x="10" y="136"><tspan class="fg-bright-green bold">Commands:</tspan> </tspan> <tspan x="10" y="154"><tspan> </tspan><tspan class="fg-bright-cyan bold">install</tspan><tspan> Install or update the given toolchains, or by default the active toolchain</tspan> </tspan> <tspan x="10" y="172"><tspan> </tspan><tspan class="fg-bright-cyan bold">uninstall</tspan><tspan> Uninstall the given toolchains</tspan> </tspan> <tspan x="10" y="190"><tspan> </tspan><tspan class="fg-bright-cyan bold">toolchain</tspan><tspan> Install, uninstall, or list toolchains</tspan> </tspan> <tspan x="10" y="208"><tspan> </tspan><tspan class="fg-bright-cyan bold">default</tspan><tspan> Set the default toolchain</tspan> </tspan> <tspan x="10" y="226"><tspan> </tspan><tspan class="fg-bright-cyan bold">show</tspan><tspan> Show the active and installed toolchains or profiles</tspan> </tspan> <tspan x="10" y="244"><tspan> </tspan><tspan class="fg-bright-cyan bold">update</tspan><tspan> Update Rust toolchains and rustup</tspan> </tspan> <tspan x="10" y="262"><tspan> </tspan><tspan class="fg-bright-cyan bold">check</tspan><tspan> Check for updates to Rust toolchains and rustup</tspan> </tspan> <tspan x="10" y="280"><tspan> </tspan><tspan class="fg-bright-cyan bold">target</tspan><tspan> Modify a toolchain&apos;s supported targets</tspan> </tspan> <tspan x="10" y="298"><tspan> </tspan><tspan class="fg-bright-cyan bold">component</tspan><tspan> Modify a toolchain&apos;s installed components</tspan> </tspan> <tspan x="10" y="316"><tspan> </tspan><tspan class="fg-bright-cyan bold">override</tspan><tspan> Modify toolchain overrides for directories</tspan> </tspan> <tspan x="10" y="334"><tspan> </tspan><tspan class="fg-bright-cyan bold">run</tspan><tspan> Run a command with an environment configured for a given toolchain</tspan> </tspan> <tspan x="10" y="352"><tspan> </tspan><tspan class="fg-bright-cyan bold">which</tspan><tspan> Display which binary will be run for a given command</tspan> </tspan> <tspan x="10" y="370"><tspan> </tspan><tspan class="fg-bright-cyan bold">doc</tspan><tspan> Open the documentation for the current toolchain</tspan> </tspan> <tspan x="10" y="388"><tspan> </tspan><tspan class="fg-bright-cyan bold">man</tspan><tspan> View the man page for a given command</tspan> </tspan> <tspan x="10" y="406"><tspan> </tspan><tspan class="fg-bright-cyan bold">self</tspan><tspan> Modify the rustup installation</tspan> </tspan> <tspan x="10" y="424"><tspan> </tspan><tspan class="fg-bright-cyan bold">set</tspan><tspan> Alter rustup settings</tspan> </tspan> <tspan x="10" y="442"><tspan> </tspan><tspan class="fg-bright-cyan bold">completions</tspan><tspan> Generate tab-completion scripts for your shell</tspan> </tspan> <tspan x="10" y="460"><tspan> </tspan><tspan class="fg-bright-cyan bold">help</tspan><tspan> Print this message or the help of the given subcommand(s)</tspan> </tspan> <tspan x="10" y="478"> </tspan> <tspan x="10" y="496"><tspan class="fg-bright-green bold">Arguments:</tspan> </tspan> <tspan x="10" y="514"><tspan> </tspan><tspan class="fg-cyan">[+toolchain]</tspan> </tspan> <tspan x="10" y="532"><tspan> Release channel (e.g. +stable) or custom toolchain to set override</tspan> </tspan> <tspan x="10" y="550"> </tspan> <tspan x="10" y="568"><tspan class="fg-bright-green bold">Options:</tspan> </tspan> <tspan x="10" y="586"><tspan> </tspan><tspan class="fg-bright-cyan bold">-v</tspan><tspan>, </tspan><tspan class="fg-bright-cyan bold">--verbose</tspan> </tspan> <tspan x="10" y="604"><tspan> Set log level to &apos;DEBUG&apos; if &apos;RUSTUP_LOG&apos; is unset</tspan> </tspan> <tspan x="10" y="622"> </tspan> <tspan x="10" y="640"><tspan> </tspan><tspan class="fg-bright-cyan bold">-q</tspan><tspan>, </tspan><tspan class="fg-bright-cyan bold">--quiet</tspan> </tspan> <tspan x="10" y="658"><tspan> Disable progress output, set log level to &apos;WARN&apos; if &apos;RUSTUP_LOG&apos; is unset</tspan> </tspan> <tspan x="10" y="676"> </tspan> <tspan x="10" y="694"><tspan> </tspan><tspan class="fg-bright-cyan bold">-h</tspan><tspan>, </tspan><tspan class="fg-bright-cyan bold">--help</tspan> </tspan> <tspan x="10" y="712"><tspan> Print help</tspan> </tspan> <tspan x="10" y="730"> </tspan> <tspan x="10" y="748"><tspan> </tspan><tspan class="fg-bright-cyan bold">-V</tspan><tspan>, </tspan><tspan class="fg-bright-cyan bold">--version</tspan> </tspan> <tspan x="10" y="766"><tspan> Print version</tspan> </tspan> <tspan x="10" y="784"> </tspan> <tspan x="10" y="802"><tspan class="fg-bright-green bold">Discussion:</tspan> </tspan> <tspan x="10" y="820"><tspan> Rustup installs The Rust Programming Language from the official</tspan> </tspan> <tspan x="10" y="838"><tspan> release channels, enabling you to easily switch between stable,</tspan> </tspan> <tspan x="10" y="856"><tspan> beta, and nightly compilers and keep them updated. It makes</tspan> </tspan> <tspan x="10" y="874"><tspan> cross-compiling simpler with binary builds of the standard library</tspan> </tspan> <tspan x="10" y="892"><tspan> for common platforms.</tspan> </tspan> <tspan x="10" y="910"> </tspan> <tspan x="10" y="928"><tspan> If you are new to Rust consider running `rustup doc --book` to</tspan> </tspan> <tspan x="10" y="946"><tspan> learn Rust.</tspan> </tspan> <tspan x="10" y="964"> </tspan> <tspan x="10" y="982"><tspan class="fg-bright-green bold">Common commands:</tspan> </tspan> <tspan x="10" y="1000"> </tspan> <tspan x="10" y="1018"><tspan> Update Rust toolchains and rustup</tspan> </tspan> <tspan x="10" y="1036"> </tspan> <tspan x="10" y="1054"><tspan> </tspan><tspan class="fg-bright-cyan bold">$ rustup update</tspan> </tspan> <tspan x="10" y="1072"><tspan> </tspan> </tspan> <tspan x="10" y="1090"><tspan> Install the current stable release of Rust for your host platform</tspan> </tspan> <tspan x="10" y="1108"> </tspan> <tspan x="10" y="1126"><tspan> </tspan><tspan class="fg-bright-cyan bold">$ rustup toolchain install stable</tspan></tspan></text></svg>