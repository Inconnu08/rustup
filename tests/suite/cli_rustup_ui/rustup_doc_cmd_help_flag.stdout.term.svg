<svg xmlns="http://www.w3.org/2000/svg" width="835" height="830"><style>.fg{fill:#aaa}.bg{fill:#000}.fg-bright-cyan{fill:#5ff}.fg-bright-green{fill:#5f5}.fg-cyan{fill:#0aa}.container{padding:0 10px;line-height:18px}.bold{font-weight:700}tspan{font:14px SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace;white-space:pre;line-height:18px}</style><rect width="100%" height="100%" y="0" class="bg" rx="4.5"/><text class="container fg" xml:space="preserve"><tspan x="10" y="28"><tspan>Open the documentation for the current toolchain</tspan> </tspan> <tspan x="10" y="46"> </tspan> <tspan x="10" y="64"><tspan class="fg-bright-green bold">Usage:</tspan><tspan> </tspan><tspan class="fg-bright-cyan bold">rustup[EXE] doc</tspan><tspan> </tspan><tspan class="fg-cyan">[OPTIONS]</tspan><tspan> </tspan><tspan class="fg-cyan">[TOPIC]</tspan> </tspan> <tspan x="10" y="82"> </tspan> <tspan x="10" y="100"><tspan class="fg-bright-green bold">Arguments:</tspan> </tspan> <tspan x="10" y="118"><tspan> </tspan><tspan class="fg-cyan">[TOPIC]</tspan><tspan> Topic such as &apos;core&apos;, &apos;fn&apos;, &apos;usize&apos;, &apos;eprintln!&apos;, &apos;core::arch&apos;, &apos;alloc::format!&apos;,</tspan> </tspan> <tspan x="10" y="136"><tspan> &apos;std::fs&apos;, &apos;std::fs::read_dir&apos;, &apos;std::io::Bytes&apos;, &apos;std::iter::Sum&apos;,</tspan> </tspan> <tspan x="10" y="154"><tspan> &apos;std::io::error::Result&apos; etc...</tspan> </tspan> <tspan x="10" y="172"> </tspan> <tspan x="10" y="190"><tspan class="fg-bright-green bold">Options:</tspan> </tspan> <tspan x="10" y="208"><tspan> </tspan><tspan class="fg-bright-cyan bold">--path</tspan><tspan> Only print the path to the documentation</tspan> </tspan> <tspan x="10" y="226"><tspan> </tspan><tspan class="fg-bright-cyan bold">--toolchain</tspan><tspan class="fg-cyan"> </tspan><tspan class="fg-cyan">&lt;TOOLCHAIN&gt;</tspan><tspan> Toolchain name, such as &apos;stable&apos;, &apos;nightly&apos;, or &apos;1.8.0&apos;. For more</tspan> </tspan> <tspan x="10" y="244"><tspan> information see `rustup help toolchain`</tspan> </tspan> <tspan x="10" y="262"><tspan> </tspan><tspan class="fg-bright-cyan bold">--alloc</tspan><tspan> The Rust core allocation and collections library</tspan> </tspan> <tspan x="10" y="280"><tspan> </tspan><tspan class="fg-bright-cyan bold">--book</tspan><tspan> The Rust Programming Language book</tspan> </tspan> <tspan x="10" y="298"><tspan> </tspan><tspan class="fg-bright-cyan bold">--cargo</tspan><tspan> The Cargo Book</tspan> </tspan> <tspan x="10" y="316"><tspan> </tspan><tspan class="fg-bright-cyan bold">--clippy</tspan><tspan> The Clippy Documentation</tspan> </tspan> <tspan x="10" y="334"><tspan> </tspan><tspan class="fg-bright-cyan bold">--core</tspan><tspan> The Rust Core Library</tspan> </tspan> <tspan x="10" y="352"><tspan> </tspan><tspan class="fg-bright-cyan bold">--edition-guide</tspan><tspan> The Rust Edition Guide</tspan> </tspan> <tspan x="10" y="370"><tspan> </tspan><tspan class="fg-bright-cyan bold">--embedded-book</tspan><tspan> The Embedded Rust Book</tspan> </tspan> <tspan x="10" y="388"><tspan> </tspan><tspan class="fg-bright-cyan bold">--error-codes</tspan><tspan> The Rust Error Codes Index</tspan> </tspan> <tspan x="10" y="406"><tspan> </tspan><tspan class="fg-bright-cyan bold">--nomicon</tspan><tspan> The Dark Arts of Advanced and Unsafe Rust Programming</tspan> </tspan> <tspan x="10" y="424"><tspan> </tspan><tspan class="fg-bright-cyan bold">--proc_macro</tspan><tspan> A support library for macro authors when defining new macros</tspan> </tspan> <tspan x="10" y="442"><tspan> </tspan><tspan class="fg-bright-cyan bold">--reference</tspan><tspan> The Rust Reference</tspan> </tspan> <tspan x="10" y="460"><tspan> </tspan><tspan class="fg-bright-cyan bold">--releases</tspan><tspan> Rust Release Notes</tspan> </tspan> <tspan x="10" y="478"><tspan> </tspan><tspan class="fg-bright-cyan bold">--rust-by-example</tspan><tspan> A collection of runnable examples that illustrate various Rust</tspan> </tspan> <tspan x="10" y="496"><tspan> concepts and standard libraries</tspan> </tspan> <tspan x="10" y="514"><tspan> </tspan><tspan class="fg-bright-cyan bold">--rustc</tspan><tspan> The compiler for the Rust programming language</tspan> </tspan> <tspan x="10" y="532"><tspan> </tspan><tspan class="fg-bright-cyan bold">--rustc-docs</tspan><tspan> The API documentation for the Rust compiler and other toolchain</tspan> </tspan> <tspan x="10" y="550"><tspan> components</tspan> </tspan> <tspan x="10" y="568"><tspan> </tspan><tspan class="fg-bright-cyan bold">--rustdoc</tspan><tspan> Documentation generator for Rust projects</tspan> </tspan> <tspan x="10" y="586"><tspan> </tspan><tspan class="fg-bright-cyan bold">--std</tspan><tspan> Standard library API documentation</tspan> </tspan> <tspan x="10" y="604"><tspan> </tspan><tspan class="fg-bright-cyan bold">--style-guide</tspan><tspan> The Rust Style Guide</tspan> </tspan> <tspan x="10" y="622"><tspan> </tspan><tspan class="fg-bright-cyan bold">--test</tspan><tspan> Support code for rustc&apos;s built in unit-test and micro-benchmarking</tspan> </tspan> <tspan x="10" y="640"><tspan> framework</tspan> </tspan> <tspan x="10" y="658"><tspan> </tspan><tspan class="fg-bright-cyan bold">--unstable-book</tspan><tspan> The Unstable Book</tspan> </tspan> <tspan x="10" y="676"><tspan> </tspan><tspan class="fg-bright-cyan bold">-h</tspan><tspan>, </tspan><tspan class="fg-bright-cyan bold">--help</tspan><tspan> Print help</tspan> </tspan> <tspan x="10" y="694"> </tspan> <tspan x="10" y="712"><tspan class="fg-bright-green bold">Discussion:</tspan> </tspan> <tspan x="10" y="730"><tspan> Opens the documentation for the currently active toolchain with</tspan> </tspan> <tspan x="10" y="748"><tspan> the default browser.</tspan> </tspan> <tspan x="10" y="766"> </tspan> <tspan x="10" y="784"><tspan> By default, it opens the documentation index. Use the various</tspan> </tspan> <tspan x="10" y="802"><tspan> flags to open specific pieces of documentation.</tspan></tspan></text></svg>