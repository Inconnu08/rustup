<svg xmlns="http://www.w3.org/2000/svg" width="740" height="632"><style>.fg{fill:#aaa}.bg{fill:#000}.fg-bright-cyan{fill:#5ff}.fg-bright-green{fill:#5f5}.fg-cyan{fill:#0aa}.container{padding:0 10px;line-height:18px}.bold{font-weight:700}tspan{font:14px SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace;white-space:pre;line-height:18px}</style><rect width="100%" height="100%" y="0" class="bg" rx="4.5"/><text class="container fg" xml:space="preserve"><tspan x="10" y="28"><tspan>Modify toolchain overrides for directories</tspan> </tspan> <tspan x="10" y="46"> </tspan> <tspan x="10" y="64"><tspan class="fg-bright-green bold">Usage:</tspan><tspan> </tspan><tspan class="fg-bright-cyan bold">rustup[EXE] override</tspan><tspan> </tspan><tspan class="fg-cyan">&lt;COMMAND&gt;</tspan> </tspan> <tspan x="10" y="82"> </tspan> <tspan x="10" y="100"><tspan class="fg-bright-green bold">Commands:</tspan> </tspan> <tspan x="10" y="118"><tspan> </tspan><tspan class="fg-bright-cyan bold">list</tspan><tspan> List directory toolchain overrides</tspan> </tspan> <tspan x="10" y="136"><tspan> </tspan><tspan class="fg-bright-cyan bold">set</tspan><tspan> Set the override toolchain for a directory</tspan> </tspan> <tspan x="10" y="154"><tspan> </tspan><tspan class="fg-bright-cyan bold">unset</tspan><tspan> Remove the override toolchain for a directory</tspan> </tspan> <tspan x="10" y="172"><tspan> </tspan><tspan class="fg-bright-cyan bold">help</tspan><tspan> Print this message or the help of the given subcommand(s)</tspan> </tspan> <tspan x="10" y="190"> </tspan> <tspan x="10" y="208"><tspan class="fg-bright-green bold">Options:</tspan> </tspan> <tspan x="10" y="226"><tspan> </tspan><tspan class="fg-bright-cyan bold">-h</tspan><tspan>, </tspan><tspan class="fg-bright-cyan bold">--help</tspan><tspan> Print help</tspan> </tspan> <tspan x="10" y="244"> </tspan> <tspan x="10" y="262"><tspan class="fg-bright-green bold">Discussion:</tspan> </tspan> <tspan x="10" y="280"><tspan> Overrides configure Rustup to use a specific toolchain when</tspan> </tspan> <tspan x="10" y="298"><tspan> running in a specific directory.</tspan> </tspan> <tspan x="10" y="316"> </tspan> <tspan x="10" y="334"><tspan> Directories can be assigned their own Rust toolchain with `rustup</tspan> </tspan> <tspan x="10" y="352"><tspan> override`. When a directory has an override then any time `rustc`</tspan> </tspan> <tspan x="10" y="370"><tspan> or `cargo` is run inside that directory, or one of its child</tspan> </tspan> <tspan x="10" y="388"><tspan> directories, the override toolchain will be invoked.</tspan> </tspan> <tspan x="10" y="406"> </tspan> <tspan x="10" y="424"><tspan> To pin to a specific nightly:</tspan> </tspan> <tspan x="10" y="442"> </tspan> <tspan x="10" y="460"><tspan> </tspan><tspan class="fg-bright-cyan bold">$ rustup override set nightly-2014-12-18</tspan> </tspan> <tspan x="10" y="478"> </tspan> <tspan x="10" y="496"><tspan> Or a specific stable release:</tspan> </tspan> <tspan x="10" y="514"> </tspan> <tspan x="10" y="532"><tspan> </tspan><tspan class="fg-bright-cyan bold">$ rustup override set 1.0.0</tspan> </tspan> <tspan x="10" y="550"> </tspan> <tspan x="10" y="568"><tspan> To see the active toolchain use `rustup show`. To remove the</tspan> </tspan> <tspan x="10" y="586"><tspan> override and use the default toolchain again, `rustup override</tspan> </tspan> <tspan x="10" y="604"><tspan> unset`.</tspan></tspan></text></svg>