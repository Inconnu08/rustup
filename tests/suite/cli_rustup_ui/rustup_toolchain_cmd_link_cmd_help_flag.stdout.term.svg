<svg xmlns="http://www.w3.org/2000/svg" width="740" height="596"><style>.fg{fill:#aaa}.bg{fill:#000}.fg-bright-cyan{fill:#5ff}.fg-bright-green{fill:#5f5}.fg-cyan{fill:#0aa}.container{padding:0 10px;line-height:18px}.bold{font-weight:700}tspan{font:14px SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace;white-space:pre;line-height:18px}</style><rect width="100%" height="100%" y="0" class="bg" rx="4.5"/><text class="container fg" xml:space="preserve"><tspan x="10" y="28"><tspan>Create a custom toolchain by symlinking to a directory</tspan> </tspan> <tspan x="10" y="46"> </tspan> <tspan x="10" y="64"><tspan class="fg-bright-green bold">Usage:</tspan><tspan> </tspan><tspan class="fg-bright-cyan bold">rustup[EXE] toolchain link</tspan><tspan> </tspan><tspan class="fg-cyan">&lt;TOOLCHAIN&gt;</tspan><tspan> </tspan><tspan class="fg-cyan">&lt;PATH&gt;</tspan> </tspan> <tspan x="10" y="82"> </tspan> <tspan x="10" y="100"><tspan class="fg-bright-green bold">Arguments:</tspan> </tspan> <tspan x="10" y="118"><tspan> </tspan><tspan class="fg-cyan">&lt;TOOLCHAIN&gt;</tspan><tspan> Custom toolchain name</tspan> </tspan> <tspan x="10" y="136"><tspan> </tspan><tspan class="fg-cyan">&lt;PATH&gt;</tspan><tspan> Path to the directory</tspan> </tspan> <tspan x="10" y="154"> </tspan> <tspan x="10" y="172"><tspan class="fg-bright-green bold">Options:</tspan> </tspan> <tspan x="10" y="190"><tspan> </tspan><tspan class="fg-bright-cyan bold">-h</tspan><tspan>, </tspan><tspan class="fg-bright-cyan bold">--help</tspan><tspan> Print help</tspan> </tspan> <tspan x="10" y="208"> </tspan> <tspan x="10" y="226"><tspan class="fg-bright-green bold">Discussion:</tspan> </tspan> <tspan x="10" y="244"><tspan> &apos;toolchain&apos; is the custom name to be assigned to the new toolchain.</tspan> </tspan> <tspan x="10" y="262"><tspan> Any name is permitted as long as:</tspan> </tspan> <tspan x="10" y="280"><tspan> - it does not include &apos;/&apos; or &apos;/&apos; except as the last character</tspan> </tspan> <tspan x="10" y="298"><tspan> - it is not equal to &apos;none&apos;</tspan> </tspan> <tspan x="10" y="316"><tspan> - it does not fully match an initialsubstring of a standard release channel.</tspan> </tspan> <tspan x="10" y="334"><tspan> For example, you can use the names &apos;latest&apos; or &apos;2017-04-01&apos; but you cannot</tspan> </tspan> <tspan x="10" y="352"><tspan> use &apos;stable&apos; or &apos;beta-i686&apos; or &apos;nightly-x86_64-unknown-linux-gnu&apos;.</tspan> </tspan> <tspan x="10" y="370"> </tspan> <tspan x="10" y="388"><tspan> &apos;path&apos; specifies the directory where the binaries and libraries for</tspan> </tspan> <tspan x="10" y="406"><tspan> the custom toolchain can be found. For example, when used for</tspan> </tspan> <tspan x="10" y="424"><tspan> development of Rust itself, toolchains can be linked directly out of</tspan> </tspan> <tspan x="10" y="442"><tspan> the build directory. After building, you can test out different</tspan> </tspan> <tspan x="10" y="460"><tspan> compiler versions as follows:</tspan> </tspan> <tspan x="10" y="478"> </tspan> <tspan x="10" y="496"><tspan> </tspan><tspan class="fg-bright-cyan bold">$ rustup toolchain link latest-stage1 build/x86_64-unknown-linux-gnu/stage1</tspan> </tspan> <tspan x="10" y="514"><tspan> </tspan><tspan class="fg-bright-cyan bold">$ rustup override set latest-stage1</tspan> </tspan> <tspan x="10" y="532"> </tspan> <tspan x="10" y="550"><tspan> If you now compile a crate in the current directory, the custom</tspan> </tspan> <tspan x="10" y="568"><tspan> toolchain &apos;latest-stage1&apos; will be used.</tspan></tspan></text></svg>