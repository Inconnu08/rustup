<svg xmlns="http://www.w3.org/2000/svg" width="827" height="596"><style>.fg{fill:#aaa}.bg{fill:#000}.container{padding:0 10px;line-height:18px}tspan{font:14px SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace;white-space:pre;line-height:18px}</style><rect width="100%" height="100%" y="0" class="bg" rx="4.5"/><text class="container fg" xml:space="preserve"><tspan x="10" y="28"><tspan>rustup-init 1.29.0 (d243d7d4e 2026-03-04)</tspan> </tspan> <tspan x="10" y="46"> </tspan> <tspan x="10" y="64"><tspan>The installer for rustup</tspan> </tspan> <tspan x="10" y="82"> </tspan> <tspan x="10" y="100"><tspan>Usage: rustup-init[EXE] [OPTIONS]</tspan> </tspan> <tspan x="10" y="118"> </tspan> <tspan x="10" y="136"><tspan>Options:</tspan> </tspan> <tspan x="10" y="154"><tspan> -v, --verbose</tspan> </tspan> <tspan x="10" y="172"><tspan> Set log level to &apos;DEBUG&apos; if &apos;RUSTUP_LOG&apos; is unset</tspan> </tspan> <tspan x="10" y="190"><tspan> -q, --quiet</tspan> </tspan> <tspan x="10" y="208"><tspan> Disable progress output, set log level to &apos;WARN&apos; if &apos;RUSTUP_LOG&apos; is unset</tspan> </tspan> <tspan x="10" y="226"><tspan> -y</tspan> </tspan> <tspan x="10" y="244"><tspan> Disable confirmation prompt</tspan> </tspan> <tspan x="10" y="262"><tspan> --default-host &lt;DEFAULT_HOST&gt;</tspan> </tspan> <tspan x="10" y="280"><tspan> Choose a default host triple</tspan> </tspan> <tspan x="10" y="298"><tspan> --default-toolchain &lt;DEFAULT_TOOLCHAIN&gt;</tspan> </tspan> <tspan x="10" y="316"><tspan> Choose a default toolchain to install. Use &apos;none&apos; to not install any toolchains at all</tspan> </tspan> <tspan x="10" y="334"><tspan> --profile &lt;PROFILE&gt;</tspan> </tspan> <tspan x="10" y="352"><tspan> [default: default] [possible values: minimal, default, complete]</tspan> </tspan> <tspan x="10" y="370"><tspan> -c, --component &lt;COMPONENT&gt;</tspan> </tspan> <tspan x="10" y="388"><tspan> Comma-separated list of component names to also install</tspan> </tspan> <tspan x="10" y="406"><tspan> -t, --target &lt;TARGET&gt;</tspan> </tspan> <tspan x="10" y="424"><tspan> Comma-separated list of target names to also install</tspan> </tspan> <tspan x="10" y="442"><tspan> --no-update-default-toolchain</tspan> </tspan> <tspan x="10" y="460"><tspan> Don&apos;t update any existing default toolchain after install</tspan> </tspan> <tspan x="10" y="478"><tspan> --no-modify-path</tspan> </tspan> <tspan x="10" y="496"><tspan> Don&apos;t configure the PATH environment variable</tspan> </tspan> <tspan x="10" y="514"><tspan> -h, --help</tspan> </tspan> <tspan x="10" y="532"><tspan> Print help</tspan> </tspan> <tspan x="10" y="550"><tspan> -V, --version</tspan> </tspan> <tspan x="10" y="568"><tspan> Print version</tspan></tspan></text></svg>